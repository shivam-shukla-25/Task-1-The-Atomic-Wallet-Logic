services:
  mongo:
    image: mongo:7
    container_name: atomic-wallet-mongo
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: |
        mongosh --quiet --eval "
          try { rs.status().ok }
          catch (e) {
            rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }] }).ok
          }
        "
      interval: 5s
      timeout: 10s
      start_period: 15s
      retries: 20

volumes:
  mongo-data:
